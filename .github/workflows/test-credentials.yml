name: Test API Credentials

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
      WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
      WCL_CLIENT_ID_2: ${{ secrets.WCL_CLIENT_ID_2 }}
      WCL_CLIENT_SECRET_2: ${{ secrets.WCL_CLIENT_SECRET_2 }}
      WCL_CLIENT_ID_3: ${{ secrets.WCL_CLIENT_ID_3 }}
      WCL_CLIENT_SECRET_3: ${{ secrets.WCL_CLIENT_SECRET_3 }}
      WCL_CLIENT_ID_4: ${{ secrets.WCL_CLIENT_ID_4 }}
      WCL_CLIENT_SECRET_4: ${{ secrets.WCL_CLIENT_SECRET_4 }}
      WCL_CLIENT_ID_5: ${{ secrets.WCL_CLIENT_ID_5 }}
      WCL_CLIENT_SECRET_5: ${{ secrets.WCL_CLIENT_SECRET_5 }}

    steps:
      - uses: actions/checkout@v4

      - name: Test credential loading (no API points consumed)
        shell: bash
        run: |
          python3 - << 'EOF'
          import os, sys
          sys.path.insert(0, "tools")
          import fetch_wcl_scores

          creds = fetch_wcl_scores._load_api_credentials()
          if not creds:
              print("ERROR: no credentials found")
              sys.exit(1)

          print(f"Found {len(creds)} credential pair(s)")
          for i, (cid, csecret) in enumerate(creds, start=1):
              try:
                  token = fetch_wcl_scores.get_access_token(cid, csecret, fetch_wcl_scores.TOKEN_URL)
                  print(f"  Key {i}: OK (token acquired, {len(token)} chars)")
              except Exception as e:
                  print(f"  Key {i}: FAILED — {e}")
                  sys.exit(1)

          print("All keys valid.")
          EOF
